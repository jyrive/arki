name: Refresh Wilma cache

on:
  schedule:
    # Every hour on the :05 to avoid the top-of-hour GitHub Actions congestion.
    - cron: '5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: cron-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/refresh
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_URL or CRON_SECRET secret is not set"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_URL")
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ] && [ "$status" != "207" ]; then
            exit 1
          fi
