name: Refresh Wilma cache

on:
  schedule:
    # Hourly at :05 (avoid top-of-hour GitHub Actions congestion).
    - cron: '5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: cron-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch & upsert into Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WILMA_BASE_URL: ${{ secrets.WILMA_BASE_URL }}
          WILMA_USERNAME: ${{ secrets.WILMA_USERNAME }}
          WILMA_PASSWORD: ${{ secrets.WILMA_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_IDS: ${{ secrets.GOOGLE_CALENDAR_IDS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: pnpm cron:fetch
